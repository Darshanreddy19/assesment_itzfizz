<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scroll Car Animation</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Playfair+Display:wght@700;800;900&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Poppins", sans-serif;
        overflow-x: hidden;
        background: #0a0a0a;
        color: white;
      }

      .parallax-bg {
        position: fixed;
        inset: 0;
        background: radial-gradient(ellipse at 20% 50%, rgba(0, 200, 255, 0.1), transparent 50%),
          radial-gradient(ellipse at 80% 80%, rgba(255, 100, 150, 0.08), transparent 50%),
          linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #0f0f1e 100%);
        z-index: -1;
      }

      .section {
        height: 200vh;
        position: relative;
      }

      .track {
        position: sticky;
        top: 0;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, rgba(20, 20, 40, 0.95), rgba(10, 10, 20, 0.98));
      }

      .road {
        width: 100vw;
        height: 220px;
        position: relative;
        overflow: hidden;
        background: linear-gradient(90deg, #1a1a2e, #16213e, #1a1a2e);
      }

      .car {
        height: 220px;
        position: absolute;
        top: 0;
        left: 0;
        z-index: 10;
        filter: drop-shadow(0 10px 30px rgba(0, 200, 255, 0.3));
      }

      .trail {
        height: 220px;
        width: 0;
        position: absolute;
        top: 0;
        left: 0;
        background: linear-gradient(90deg, transparent, rgba(0, 200, 255, 0.6));
        z-index: 1;
      }

      .text-box {
        opacity: 0;
        padding: 25px 35px;
        border-radius: 20px;
        position: absolute;
        z-index: 5;
        display: flex;
        flex-direction: column;
        gap: 8px;
        backdrop-filter: blur(10px);
      }

      .num-box {
        font-size: 56px;
        font-weight: 800;
      }

      #box1 { color: #00d4ff; }
      #box2 { color: #ff6b9d; }
      #box3 { color: #bb86fc; }
      #box4 { color: #ffc700; }

      .value-add {
        position: absolute;
        top: 25%;
        left: 8%;
        font-size: 6.5rem;
        font-family: "Playfair Display", serif;
        font-weight: 900;
        display: flex;
        gap: 0.15rem;
        z-index: 5;
      }

      .value-letter {
        opacity: 0;
        background: linear-gradient(135deg, #00ffff, #0099ff, #ff006e, #8338ec);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    </style>
  </head>

  <body>
    <div class="parallax-bg"></div>

    <div class="section">
      <div class="track">
        <div class="road">
          <img
            src="https://www.motorbeam.com/wp-content/uploads/Lamborghini-SC20-Top.jpg"
            class="car"
            id="car"
          />
          <div class="trail" id="trail"></div>

          <div class="value-add">
            <span class="value-letter">W</span>
            <span class="value-letter">E</span>
            <span class="value-letter">L</span>
            <span class="value-letter">C</span>
            <span class="value-letter">O</span>
            <span class="value-letter">M</span>
            <span class="value-letter">E</span>
            <span class="value-letter">&nbsp;</span>
            <span class="value-letter">I</span>
            <span class="value-letter">T</span>
            <span class="value-letter">Z</span>
            <span class="value-letter">F</span>
            <span class="value-letter">I</span>
            <span class="value-letter">Z</span>
            <span class="value-letter">Z</span>
          </div>
        </div>

        <div class="text-box" id="box1" style="top: 8%; right: 30%">
          <span class="num-box">58%</span>
          <span>Increase in pick up point use</span>
        </div>

        <div class="text-box" id="box2" style="bottom: 8%; right: 35%">
          <span class="num-box">23%</span>
          <span>Decreased in customer phone calls</span>
        </div>

        <div class="text-box" id="box3" style="top: 8%; right: 10%">
          <span class="num-box">27%</span>
          <span>Increase in pick up point use</span>
        </div>

        <div class="text-box" id="box4" style="bottom: 8%; right: 12.5%">
          <span class="num-box">40%</span>
          <span>Decreased in customer phone calls</span>
        </div>
      </div>
    </div>

    <script>
      gsap.registerPlugin(ScrollTrigger);

      const car = document.getElementById("car");
      const trail = document.getElementById("trail");
      const letters = gsap.utils.toArray(".value-letter");
      const valueAdd = document.querySelector(".value-add");
      const valueRect = valueAdd.getBoundingClientRect();
      const letterOffsets = letters.map(l => l.offsetLeft);

      const endX = window.innerWidth - 150;

      // Main scroll animation
      gsap.to(car, {
        x: endX,
        ease: "power2.inOut",
        scrollTrigger: {
          trigger: ".section",
          start: "top top",
          end: "bottom top",
          scrub: true,
          pin: ".track",
        },
        onUpdate: () => {
          const carX = gsap.getProperty(car, "x") + 75;
          letters.forEach((letter, i) => {
            const letterX = valueRect.left + letterOffsets[i];
            letter.style.opacity = carX >= letterX ? 1 : 0;
          });
          gsap.set(trail, { width: carX });
        },
      });

      ["#box1", "#box2", "#box3", "#box4"].forEach((box, i) => {
        gsap.to(box, {
          opacity: 1,
          scrollTrigger: {
            trigger: ".section",
            start: `top+=${400 + i * 200} top`,
            end: `top+=${600 + i * 200} top`,
            scrub: true,
          },
        });
      });
    </script>
  </body>
</html>
